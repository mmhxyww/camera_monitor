<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera Monitor</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header>
        <h1>Camera Monitor</h1>
        <span class="cam-count" id="camCount">0 cameras</span>
        <input type="file" id="fileInput" accept=".json" style="display:none" />
        <button class="btn btn-ghost icon-btn" id="btnImport" title="設定をインポート">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <span>Import</span>
        </button>
        <button class="btn btn-ghost icon-btn" id="btnExport" title="設定をエクスポート">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span>Export</span>
        </button>
        <div class="layout-wrapper">
            <button class="btn btn-ghost" id="btnLayout" title="レイアウト切替">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                </svg>
            </button>
            <div class="layout-popup" id="layoutPopup"></div>
        </div>
    </header>

    <div class="add-bar">
        <input id="inputLabel" class="label-input" type="text" placeholder="ラベル (任意)" />
        <input id="inputUrl" type="text" placeholder="http://12.34.56.789:5000/mjpegfeed?oid=1&full" />
        <button class="btn btn-primary" id="btnAdd">追加</button>
    </div>

    <main>
        <div id="grid">
            <div id="empty">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <path d="M8 21h8M12 17v4" />
                </svg>
                <div>カメラを追加してください</div>
            </div>
        </div>
    </main>

    <script>
        const STORAGE_KEY = 'cam_monitor_v1';
        const grid = document.getElementById('grid');
        const empty = document.getElementById('empty');
        const camCount = document.getElementById('camCount');
        const inputUrl = document.getElementById('inputUrl');
        const inputLabel = document.getElementById('inputLabel');
        const btnAdd = document.getElementById('btnAdd');
        const btnLayout = document.getElementById('btnLayout');
        const layoutPopup = document.getElementById('layoutPopup');

        let cameras = [];
        let currentCols = 0;

        // ── Layout Popup ──
        const LAYOUTS = [
            { cols: 0, label: '自動' },
            { cols: 1, label: '1 列' },
            { cols: 2, label: '2 列' },
            { cols: 3, label: '3 列' },
            { cols: 4, label: '4 列' },
            { cols: 5, label: '5 列' },
            { cols: 6, label: '6 列' },
        ];

        LAYOUTS.forEach(({ cols, label }) => {
            const btn = document.createElement('button');
            btn.className = 'layout-option';
            btn.dataset.cols = cols;

            const icon = document.createElement('span');
            icon.className = 'layout-icon';
            const barCount = cols === 0 ? 3 : Math.min(cols, 6);
            for (let i = 0; i < barCount; i++) {
                const bar = document.createElement('i');
                icon.appendChild(bar);
            }

            const txt = document.createElement('span');
            txt.textContent = label;

            btn.append(icon, txt);
            btn.addEventListener('click', () => {
                currentCols = cols;
                setColumns(cols);
                layoutPopup.classList.remove('open');
                updateActiveOption();
            });
            layoutPopup.appendChild(btn);
        });

        function updateActiveOption() {
            layoutPopup.querySelectorAll('.layout-option').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.cols) === currentCols);
            });
        }

        btnLayout.addEventListener('click', (e) => {
            e.stopPropagation();
            layoutPopup.classList.toggle('open');
            updateActiveOption();
        });

        document.addEventListener('click', () => layoutPopup.classList.remove('open'));
        layoutPopup.addEventListener('click', (e) => e.stopPropagation());

        // ── Helpers ──
        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(
                cameras.map(c => ({ id: c.id, url: c.url, label: c.label }))
            ));
        }

        function updateCount() {
            const n = cameras.length;
            camCount.textContent = `${n} camera${n !== 1 ? 's' : ''}`;
            empty.style.display = n === 0 ? '' : 'none';
        }

        function setColumns(n) {
            grid.style.gridTemplateColumns = n === 0
                ? 'repeat(auto-fill, minmax(320px, 1fr))'
                : `repeat(${n}, 1fr)`;
        }

        function makeTile(cam) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.dataset.id = cam.id;

            const dot = document.createElement('div');
            dot.className = 'tile-dot';

            const label = document.createElement('div');
            label.className = 'tile-label';
            label.contentEditable = 'true';
            label.spellcheck = false;
            label.textContent = cam.label;
            label.addEventListener('blur', () => {
                cam.label = label.textContent.trim() || cam.label;
                label.textContent = cam.label;
                save();
            });
            label.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); label.blur(); } });

            const removeBtn = document.createElement('button');
            removeBtn.className = 'tile-remove';
            removeBtn.title = '削除';
            removeBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
            removeBtn.addEventListener('click', () => removeCamera(cam.id));

            const dragHandle = document.createElement('div');
            dragHandle.className = 'tile-drag-handle';
            dragHandle.title = 'ドラッグして並び替え';
            dragHandle.innerHTML = `<svg width="10" height="14" viewBox="0 0 10 14" fill="currentColor"><circle cx="3" cy="2" r="1.3"/><circle cx="7" cy="2" r="1.3"/><circle cx="3" cy="7" r="1.3"/><circle cx="7" cy="7" r="1.3"/><circle cx="3" cy="12" r="1.3"/><circle cx="7" cy="12" r="1.3"/></svg>`;
            dragHandle.addEventListener('mousedown', () => { tile.draggable = true; });

            const header = document.createElement('div');
            header.className = 'tile-header';
            header.append(dragHandle, dot, label, removeBtn);

            const img = document.createElement('img');
            img.alt = cam.label;

            const overlay = document.createElement('div');
            overlay.className = 'tile-overlay';
            overlay.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>接続できません</span>`;

            const body = document.createElement('div');
            body.className = 'tile-body';
            body.append(img, overlay);

            const urlText = document.createElement('div');
            urlText.className = 'tile-url';
            urlText.contentEditable = 'plaintext-only';
            urlText.spellcheck = false;
            urlText.textContent = cam.url;
            urlText.title = cam.url;

            const reloadBtn = document.createElement('button');
            reloadBtn.className = 'tile-reload';
            reloadBtn.title = '再読み込み';
            reloadBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`;
            reloadBtn.addEventListener('click', () => {
                reloadBtn.classList.add('spin');
                dot.className = 'tile-dot';
                overlay.classList.remove('show');
                loadImg(img, cam.url, dot, overlay, reloadBtn);
            });

            // URL 編集イベント（reloadBtn 定義後に追加）
            urlText.addEventListener('blur', () => {
                const newUrl = urlText.textContent.trim();
                if (newUrl && newUrl !== cam.url) {
                    cam.url = newUrl;
                    urlText.title = newUrl;
                    dot.className = 'tile-dot';
                    overlay.classList.remove('show');
                    reloadBtn.classList.add('spin');
                    loadImg(img, cam.url, dot, overlay, reloadBtn);
                    save();
                } else {
                    urlText.textContent = cam.url;
                }
            });
            urlText.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); urlText.blur(); }
                if (e.key === 'Escape') { urlText.textContent = cam.url; urlText.blur(); }
            });

            const footer = document.createElement('div');
            footer.className = 'tile-footer';
            footer.append(urlText, reloadBtn);

            tile.append(header, body, footer);
            cam._dot = dot;
            cam._overlay = overlay;
            cam._img = img;
            cam._reloadBtn = reloadBtn;

            loadImg(img, cam.url, dot, overlay, reloadBtn);
            return tile;
        }

        function loadImg(img, url, dot, overlay, reloadBtn) {
            const ts = `${url}${url.includes('?') ? '&' : '?'}_t=${Date.now()}`;
            img.src = '';
            img.onload = () => {
                dot.className = 'tile-dot live';
                overlay.classList.remove('show');
                reloadBtn.classList.remove('spin');
            };
            img.onerror = () => {
                dot.className = 'tile-dot error';
                overlay.classList.add('show');
                reloadBtn.classList.remove('spin');
            };
            img.src = ts;
        }

        function addCamera(url, label) {
            url = url.trim();
            if (!url) return;
            label = label.trim() || `Camera ${cameras.length + 1}`;
            const cam = { id: Date.now().toString(36) + Math.random().toString(36).slice(2), url, label };
            cameras.push(cam);
            const tile = makeTile(cam);
            grid.insertBefore(tile, empty);
            updateCount();
            save();
        }

        function removeCamera(id) {
            cameras = cameras.filter(c => c.id !== id);
            const tile = grid.querySelector(`[data-id="${id}"]`);
            if (tile) {
                tile.style.transition = 'opacity .2s, transform .2s';
                tile.style.opacity = '0';
                tile.style.transform = 'scale(.97)';
                setTimeout(() => tile.remove(), 200);
            }
            updateCount();
            save();
        }

        function doAdd() {
            const url = inputUrl.value.trim();
            const lbl = inputLabel.value.trim();
            if (!url) { inputUrl.focus(); return; }
            addCamera(url, lbl);
            inputUrl.value = '';
            inputLabel.value = '';
            inputUrl.focus();
        }

        btnAdd.addEventListener('click', doAdd);
        inputUrl.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });

        // ── Export ──
        document.getElementById('btnExport').addEventListener('click', () => {
            if (cameras.length === 0) return;
            const data = cameras.map(c => ({ label: c.label, url: c.url }));
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `cameras_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
        });

        // ── Import ──
        document.getElementById('btnImport').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!Array.isArray(data)) throw new Error();
                    const valid = data.filter(c => c && typeof c.url === 'string' && c.url.trim());
                    if (valid.length === 0) { alert('有効なカメラデータがありません。'); return; }
                    const replace = cameras.length > 0 && confirm(
                        `${valid.length} 件のカメラ設定が見つかりました。\n\n「 OK 」 → 現在の設定を置き換え\n「 キャンセル 」 → 既存に追加`
                    );
                    if (replace) {
                        [...grid.querySelectorAll('.tile')].forEach(t => t.remove());
                        cameras = [];
                    }
                    valid.forEach(c => addCamera(c.url, c.label || ''));
                } catch (_) {
                    alert('読み込みに失敗しました。JSON 形式を確認してください。');
                }
                e.target.value = '';
            };
            reader.readAsText(file);
        });

        // ── Drag & Drop ──
        let dragSrcId = null;

        grid.addEventListener('dragstart', (e) => {
            const tile = e.target.closest('.tile');
            if (!tile || !tile.draggable) return;
            dragSrcId = tile.dataset.id;
            tile.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });

        grid.addEventListener('dragend', () => {
            grid.querySelectorAll('.tile').forEach(t => {
                t.classList.remove('dragging', 'drag-over');
                t.draggable = false;
            });
            dragSrcId = null;
        });

        grid.addEventListener('dragover', (e) => {
            if (!dragSrcId) return;
            e.preventDefault();
            const tile = e.target.closest('.tile');
            if (!tile || tile.dataset.id === dragSrcId) return;
            grid.querySelectorAll('.tile.drag-over').forEach(t => t.classList.remove('drag-over'));
            tile.classList.add('drag-over');
        });

        grid.addEventListener('dragleave', (e) => {
            const tile = e.target.closest('.tile');
            if (tile && !tile.contains(e.relatedTarget)) tile.classList.remove('drag-over');
        });

        grid.addEventListener('drop', (e) => {
            e.preventDefault();
            const targetTile = e.target.closest('.tile');
            if (!targetTile || !dragSrcId || targetTile.dataset.id === dragSrcId) return;
            targetTile.classList.remove('drag-over');
            const srcTile = grid.querySelector(`[data-id="${dragSrcId}"]`);
            if (!srcTile) return;
            const tiles = [...grid.querySelectorAll('.tile')];
            if (tiles.indexOf(srcTile) < tiles.indexOf(targetTile)) {
                targetTile.after(srcTile);
            } else {
                targetTile.before(srcTile);
            }
            const order = [...grid.querySelectorAll('.tile')].map(t => t.dataset.id);
            cameras.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
            save();
        });

        // ── Restore ──
        try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            saved.forEach(c => addCamera(c.url, c.label));
        } catch (_) { }

        updateCount();
    </script>
</body>

</html>
